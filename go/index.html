<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBReply AI | Активация доступа</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); max-width: 340px; width: 90%; border: 1px solid #334155; }
        .logo { width: 70px; height: 70px; margin-bottom: 15px; border-radius: 18px; box-shadow: 0 0 20px rgba(0, 136, 204, 0.4); }
        h1 { font-size: 1.4rem; margin: 0 0 10px; color: #f8fafc; }
        .offer { color: #38bdf8; font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        p { font-size: 0.95rem; color: #94a3b8; margin-bottom: 25px; line-height: 1.5; }
        .btn { display: block; background: #22c55e; color: white; text-decoration: none; padding: 16px; border-radius: 14px; font-weight: bold; font-size: 1rem; transition: all 0.2s; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .btn:active { transform: scale(0.97); background: #16a34a; }
        .loader-bar { height: 4px; width: 100%; background: #334155; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress { height: 100%; width: 0; background: #38bdf8; animation: progress 1.5s ease-in-out forwards; }
        @keyframes progress { to { width: 100%; } }
    </style>
</head>
<body>

<div class="card">
    <img src="https://wbreply.ai/logo.png" alt="WBReply AI" class="logo">
    <h1>Доступ готов</h1>
    <div class="offer">🎁 3 ДНЯ БЕСПЛАТНО</div>
    <div class="loader-bar"><div class="progress"></div></div>
    <p>Основной интерфейс управления работает в Telegram для обеспечения максимальной скорости и безопасности ваших данных. Нажмите кнопку, чтобы войти.</p>
    <a href="tg://resolve?domain=WBReplyAIbot" class="btn">ПОЛУЧИТЬ ДОСТУП В TG</a>
</div>

<script>
    // Пытаемся выкинуть в ТГ автоматически через 1.5 сек
    setTimeout(function() {
        window.location.href = "tg://resolve?domain=WBReplyAIbot";
    }, 1500);
</script>

    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
